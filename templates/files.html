<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SageCluster Files</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{slate:{850:'#151f32'}}}}}</script>
    <style>
        body { background: #0f172a; color: #cbd5e1; font-family: system-ui, sans-serif; margin:0; }
        #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        #app-screen { display:none; min-height:100vh; }
        .login-box { background:#1e293b; border:1px solid #334155; border-radius:16px; padding:40px; width:360px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
        .login-box h1 { font-size:20px; font-weight:700; color:white; margin-bottom:24px; display:flex; align-items:center; gap:10px; }
        .login-box input { width:100%; padding:10px 14px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#e2e8f0; font-size:14px; outline:none; }
        .login-box input:focus { border-color:#10b981; }
        .login-box .btn { width:100%; padding:10px; border-radius:8px; background:#10b981; color:white; font-weight:600; border:none; cursor:pointer; font-size:14px; margin-top:16px; }
        .login-box .btn:hover { background:#059669; }
        .login-box .error { color:#ef4444; font-size:12px; margin-top:8px; display:none; }
        #sidebar { width:220px; background:#1e293b; border-right:1px solid #334155; overflow-y:auto; flex-shrink:0; }
        #sidebar .folder-item { padding:8px 16px; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:13px; color:#94a3b8; border-left:3px solid transparent; }
        #sidebar .folder-item:hover { background:rgba(255,255,255,0.04); color:#e2e8f0; }
        #sidebar .folder-item.active { background:rgba(16,185,129,0.1); color:#10b981; border-left-color:#10b981; }
        #sidebar .folder-item i { font-size:16px; }
        #main-area { flex:1; display:flex; flex-direction:column; min-width:0; }
        #toolbar { display:flex; align-items:center; gap:8px; padding:12px 20px; border-bottom:1px solid #334155; background:#1e293b; flex-wrap:wrap; }
        #toolbar .btn-icon { padding:6px 12px; border-radius:6px; background:transparent; border:none; color:#94a3b8; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:4px; }
        #toolbar .btn-icon:hover { background:rgba(255,255,255,0.06); color:#e2e8f0; }
        #toolbar .btn-icon.primary { background:rgba(16,185,129,0.15); color:#10b981; }
        #toolbar .btn-icon.primary:hover { background:rgba(16,185,129,0.25); }
        #toolbar .btn-icon.danger { color:#ef4444; }
        #toolbar .btn-icon.danger:hover { background:rgba(239,68,68,0.15); }
        #breadcrumb { padding:8px 20px; font-size:13px; display:flex; align-items:center; gap:4px; flex-wrap:wrap; border-bottom:1px solid #1e293b; }
        #breadcrumb span { color:#64748b; margin:0 2px; }
        #breadcrumb a { color:#94a3b8; cursor:pointer; text-decoration:none; }
        #breadcrumb a:hover { color:#10b981; }
        #breadcrumb .current { color:#e2e8f0; font-weight:500; }
        #file-grid { flex:1; overflow-y:auto; padding:16px; display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; align-content:start; }
        .file-item { display:flex; flex-direction:column; align-items:center; padding:12px 8px; border-radius:8px; cursor:pointer; text-align:center; border:2px solid transparent; }
        .file-item:hover { background:rgba(255,255,255,0.04); }
        .file-item.selected { background:rgba(16,185,129,0.1); border-color:#10b981; }
        .file-item .icon { font-size:32px; margin-bottom:6px; }
        .file-item .name { font-size:11px; color:#cbd5e1; word-break:break-all; line-height:1.3; max-width:100%; }
        .file-item .size { font-size:10px; color:#64748b; margin-top:2px; }
        #status-bar { padding:6px 20px; border-top:1px solid #334155; font-size:11px; color:#64748b; background:#1e293b; display:flex; justify-content:space-between; }
        #upload-progress { display:none; height:3px; background:#334155; position:relative; }
        #upload-progress .bar { height:100%; background:#10b981; width:0%; transition:width 0.3s; }
        .modal-overlay { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:24px; width:400px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
        .modal h3 { font-size:16px; font-weight:600; color:white; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
        .modal input, .modal select { width:100%; padding:8px 12px; border-radius:6px; border:1px solid #334155; background:#0f172a; color:#e2e8f0; font-size:13px; outline:none; margin-bottom:12px; }
        .modal input:focus, .modal select:focus { border-color:#10b981; }
        .modal .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
        .modal .btn-row button { padding:8px 20px; border-radius:6px; font-size:13px; font-weight:500; border:none; cursor:pointer; }
        .modal .btn-cancel { background:#334155; color:#94a3b8; }
        .modal .btn-cancel:hover { background:#3b4a5c; }
        .modal .btn-confirm { background:#10b981; color:white; }
        .modal .btn-confirm:hover { background:#059669; }
        .modal .btn-danger { background:#ef4444; color:white; }
        .modal .btn-danger:hover { background:#dc2626; }
        #drop-zone { position:fixed; inset:0; z-index:99; display:none; background:rgba(16,185,129,0.08); border:3px dashed #10b981; align-items:center; justify-content:center; font-size:18px; color:#10b981; font-weight:600; pointer-events:none; }
        #drop-zone.dragging { display:flex; }
        .toast { position:fixed; top:20px; right:20px; z-index:200; background:#1e293b; border:1px solid #334155; border-radius:10px; padding:12px 20px; font-size:13px; color:#e2e8f0; box-shadow:0 10px 30px rgba(0,0,0,0.5); display:none; }
        .toast.show { display:block; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }
        #loading-overlay { display:none; position:fixed; inset:0; z-index:150; background:rgba(0,0,0,0.4); align-items:center; justify-content:center; }
        #loading-overlay.show { display:flex; }
        .spinner { width:32px; height:32px; border:3px solid #334155; border-top-color:#10b981; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .hidden { display:none !important; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    <div id="loading-overlay"><div class="spinner"></div></div>
    <div id="drop-zone"><i class="ph ph-cloud-arrow-up" style="font-size:48px;margin-right:12px"></i> Drop files to upload</div>

    <div id="login-screen">
        <div class="login-box">
            <h1><i class="ph ph-hard-drives" style="color:#10b981"></i> SageCluster Files</h1>
            <p style="font-size:13px;color:#94a3b8;margin-bottom:20px">Enter the file manager password to access NFS storage.</p>
            <input type="password" id="login-password" placeholder="Password" autocomplete="off" />
            <div class="error" id="login-error">Invalid password</div>
            <button class="btn" onclick="doLogin()">Login</button>
        </div>
    </div>

    <div id="app-screen">
        <header style="background:#1e293b;border-bottom:1px solid #334155;padding:10px 20px;display:flex;align-items:center;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:10px">
                <i class="ph ph-hard-drives" style="font-size:20px;color:#10b981"></i>
                <span style="font-weight:600;color:white;font-size:15px">SageCluster Files</span>
                <span style="font-size:11px;color:#64748b;margin-left:8px">/mnt/storage</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px;font-size:13px">
                <span id="storage-info" style="color:#94a3b8;font-size:12px"></span>
                <button onclick="logout()" style="padding:4px 12px;border-radius:6px;background:transparent;border:1px solid #334155;color:#94a3b8;cursor:pointer;font-size:12px">Logout</button>
            </div>
        </header>
        <div style="display:flex;flex:1;min-height:0">
            <div id="sidebar">
                <div style="padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:#64748b">Folders</div>
                <div class="folder-item active" onclick="navigateTo('')"><i class="ph ph-folder-open" style="color:#10b981"></i> / (root)</div>
            </div>
            <div id="main-area">
                <div id="toolbar">
                    <button class="btn-icon primary" onclick="showNewFolderModal()"><i class="ph ph-folder-plus"></i> New Folder</button>
                    <button class="btn-icon primary" onclick="document.getElementById('upload-input').click()"><i class="ph ph-upload"></i> Upload</button>
                    <input type="file" id="upload-input" multiple style="display:none" onchange="handleUpload(this.files)" />
                    <button class="btn-icon" onclick="showCompressModal()" id="btn-compress" disabled><i class="ph ph-file-archive"></i> Compress</button>
                    <button class="btn-icon" onclick="showExtractModal()" id="btn-extract" disabled><i class="ph ph-file-zip"></i> Extract</button>
                    <button class="btn-icon" onclick="showRenameModal()" id="btn-rename" disabled><i class="ph ph-pencil"></i> Rename</button>
                    <button class="btn-icon danger" onclick="confirmDelete()" id="btn-delete" disabled><i class="ph ph-trash"></i> Delete</button>
                    <button class="btn-icon" onclick="downloadSelected()" id="btn-download" disabled><i class="ph ph-download"></i> Download</button>
                    <span style="flex:1"></span>
                    <button class="btn-icon" onclick="refreshFiles()"><i class="ph ph-arrows-clockwise"></i></button>
                </div>
                <div id="breadcrumb"></div>
                <div id="upload-progress"><div class="bar" id="progress-bar"></div></div>
                <div id="file-grid"></div>
                <div id="status-bar"><span id="status-left"></span><span id="status-right"></span></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-new-folder">
        <div class="modal">
            <h3><i class="ph ph-folder-plus" style="color:#10b981"></i> New Folder</h3>
            <input type="text" id="new-folder-name" placeholder="Folder name" autofocus />
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeModal('modal-new-folder')">Cancel</button>
                <button class="btn-confirm" onclick="doMkdir()">Create</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-rename">
        <div class="modal">
            <h3><i class="ph ph-pencil" style="color:#f59e0b"></i> Rename</h3>
            <input type="text" id="rename-name" placeholder="New name" autofocus />
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeModal('modal-rename')">Cancel</button>
                <button class="btn-confirm" onclick="doRename()">Rename</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-delete">
        <div class="modal">
            <h3><i class="ph ph-warning" style="color:#ef4444"></i> Confirm Delete</h3>
            <p id="delete-msg" style="font-size:13px;color:#94a3b8;margin-bottom:12px"></p>
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeModal('modal-delete')">Cancel</button>
                <button class="btn-danger" onclick="doDelete()">Delete</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-compress">
        <div class="modal">
            <h3><i class="ph ph-file-archive" style="color:#8b5cf6"></i> Compress</h3>
            <p style="font-size:12px;color:#94a3b8;margin-bottom:12px">Compress selected items</p>
            <input type="text" id="compress-name" placeholder="Archive name (without extension)" />
            <select id="compress-format">
                <option value="tar.gz">tar.gz</option>
                <option value="tar.xz">tar.xz</option>
                <option value="zip">zip</option>
            </select>
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeModal('modal-compress')">Cancel</button>
                <button class="btn-confirm" onclick="doCompress()">Compress</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-extract">
        <div class="modal">
            <h3><i class="ph ph-file-zip" style="color:#8b5cf6"></i> Extract Archive</h3>
            <p id="extract-msg" style="font-size:13px;color:#94a3b8;margin-bottom:12px"></p>
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeModal('modal-extract')">Cancel</button>
                <button class="btn-confirm" onclick="doExtract()">Extract Here</button>
            </div>
        </div>
    </div>

    <script src="/static/js/files.js?v=3"></script>
</body>
</html>
